syntax = "proto3";

package chat;

service ChatService {
  rpc SendMessage (SendMessageRequest) returns (SendMessageResponse);
  rpc GetMessages (GetMessagesRequest) returns (GetMessagesResponse);
  rpc PinMessage (PinMessageRequest) returns (MessageItem);
  rpc UnpinMessage (PinMessageRequest) returns (MessageItem);
  rpc DeleteMessage (DeleteMessageRequest) returns (DeleteMessageResponse);
}

message SendMessageRequest {
  string user_id = 1;
  string user_name = 2;
  string user_email = 3;
  string user_avatar = 4;
  string workspace_id = 5;
  string channel_id = 6;
  string content = 7;
  string message_type = 8;
  string metadata = 9;
}

message SendMessageResponse {
  string id = 1;
  string sender_id = 2;
  string sender_name = 3;
  string sender_email = 4;
  string sender_avatar = 5;
  string content = 6;
  string message_type = 7;
  string created_at = 8;
  string channel_id = 9;
  string metadata = 10;
  bool is_pinned = 11;
  string pinned_at = 12;
  string pinned_by = 13;
}

message PinMessageRequest {
  string channel_id = 1;
  string message_id = 2;
  string pinned_by = 3;
}

message DeleteMessageRequest {
  string channel_id = 1;
  string message_id = 2;
  string deleted_by = 3;
}

message DeleteMessageResponse {
  string id = 1;
  string channel_id = 2;
}

message GetMessagesRequest {
  string channel_id = 1;
  int32 page = 2;
  int32 size = 3;
}

message GetMessagesResponse {
  repeated MessageItem messages = 1;
  bool has_more = 2;
}

message MessageItem {
  string id = 1;
  string sender_id = 2;
  string sender_name = 3;
  string sender_email = 4;
  string sender_avatar = 5;
  string content = 6;
  string message_type = 7;
  string created_at = 8;
  string channel_id = 9;
  string metadata = 10;
  bool is_pinned = 11;
  string pinned_at = 12;
  string pinned_by = 13;
}
