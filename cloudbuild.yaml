steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stack-chat-api:latest',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'push',
        'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stack-chat-api:latest'
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      [
        'run',
        'deploy',
        'stack-chat-api',
        '--image',
        'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stack-chat-api:latest',
        '--region',
        'asia-southeast1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/stack-chat-api:latest'

# Logging config để tránh lỗi service_account
options:
  logging: CLOUD_LOGGING_ONLY
